<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI训练师4级刷题</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1e;--surface:#111827;--card:#1e293b;--card-hover:#263549;
  --primary:#6366f1;--primary-light:#818cf8;--primary-bg:rgba(99,102,241,.1);
  --success:#22c55e;--success-bg:rgba(34,197,94,.12);
  --danger:#ef4444;--danger-bg:rgba(239,68,68,.12);
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,.12);
  --text:#f1f5f9;--text-2:#cbd5e1;--text-3:#94a3b8;--text-4:#64748b;
  --border:#1e293b;--border-2:#334155;
  --r:14px;--r-sm:10px;--r-xs:8px;
  --shadow:0 8px 32px rgba(0,0,0,.45);
  --safe-bottom:max(12px,env(safe-area-inset-bottom));
}
html,body{height:100%;overflow-x:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
}
input,textarea,button,select{font-family:inherit}

/* ===== Screens ===== */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center}
.screen.active{display:flex}
.spinner{width:44px;height:44px;border:3px solid var(--border-2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{color:var(--danger);font-size:15px;line-height:1.8;max-width:400px;white-space:pre-wrap}

/* ===== Sticky Header ===== */
.hdr{
  position:sticky;top:0;z-index:50;
  background:rgba(10,15,30,.88);backdrop-filter:saturate(180%) blur(14px);
  -webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--border);
}
.hdr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.type-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--primary);color:#fff;letter-spacing:.5px}
.stat{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.stat-ok{background:var(--success-bg);color:var(--success);border:1px solid rgba(34,197,94,.25)}
.stat-err{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.qnum{font-size:13px;color:var(--text-3);background:var(--card);padding:3px 10px;border-radius:20px}
.hdr-right{display:flex;align-items:center;gap:6px}
.progress{height:4px;background:var(--border);margin-top:8px;border-radius:2px;overflow:hidden}
.progress-inner{height:100%;background:linear-gradient(90deg,var(--primary),#a78bfa);border-radius:2px;transition:width .35s ease}

/* ===== Mode bar ===== */
.mode-bar{
  padding:6px 16px;display:none;align-items:center;justify-content:space-between;
  background:var(--warn-bg);border-bottom:1px solid rgba(245,158,11,.15);
  font-size:13px;color:var(--warn);
}
.mode-bar.on{display:flex}
.mode-bar button{background:none;border:1px solid var(--warn);color:var(--warn);padding:2px 10px;border-radius:6px;font-size:12px;cursor:pointer}

/* ===== Main Content ===== */
.main{padding:16px 16px 140px}
.stem{font-size:17px;line-height:1.75;font-weight:500;margin-bottom:18px}

/* ===== Option Cards ===== */
.opt{
  display:flex;align-items:flex-start;width:100%;
  padding:14px 16px;margin-bottom:10px;
  background:var(--card);border:2px solid transparent;
  border-radius:var(--r);color:var(--text);
  font-size:15px;line-height:1.55;text-align:left;
  cursor:pointer;transition:all .18s;gap:0;
  -webkit-user-select:none;user-select:none;
}
.opt:active{transform:scale(.98)}
.opt-letter{
  width:28px;height:28px;border-radius:var(--r-xs);
  background:var(--border-2);font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-right:12px;transition:all .18s;
}
.opt-body{flex:1}
.opt.hit-ok{background:var(--success-bg);border-color:var(--success)}
.opt.hit-ok .opt-letter{background:var(--success);color:#fff}
.opt.hit-err{background:var(--danger-bg);border-color:var(--danger)}
.opt.hit-err .opt-letter{background:var(--danger);color:#fff}
.opt.show-ok{background:var(--success-bg);border-color:#16a34a}
.opt.show-ok .opt-letter{background:#16a34a;color:#fff}
.opt.locked{pointer-events:none;opacity:.65}
.opt.locked.show-ok,.opt.locked.hit-ok,.opt.locked.hit-err{opacity:1}

/* ===== Analysis Panel ===== */
.analysis-panel{
  margin-top:16px;border-radius:var(--r);overflow:hidden;
  background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(168,85,247,.06));
  border:1px solid rgba(99,102,241,.2);
  animation:fadeUp .35s ease;
}
.analysis-panel[hidden]{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.analysis-header{display:flex;align-items:center;gap:8px;padding:11px 16px;font-size:14px;font-weight:600;color:#a78bfa;border-bottom:1px solid rgba(99,102,241,.12)}
.analysis-content{padding:14px 16px;font-size:14px;line-height:1.85}
.analysis-content h3{font-size:15px;margin:10px 0 5px;color:#c4b5fd}
.analysis-content h3:first-child{margin-top:0}
.analysis-content p{margin-bottom:6px}
.analysis-content ul{padding-left:18px;margin-bottom:6px}
.analysis-content strong{color:#e2e8f0}
.analysis-content code{background:rgba(99,102,241,.15);padding:1px 5px;border-radius:4px;font-size:13px}

/* ===== Bottom Bar ===== */
.btm{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:10px 16px;padding-bottom:var(--safe-bottom);
  background:rgba(10,15,30,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;gap:10px;
}
.btn-primary{
  flex:1;padding:13px;border:none;border-radius:var(--r);
  background:var(--primary);color:#fff;font-size:16px;font-weight:600;
  cursor:pointer;transition:all .15s;display:none;
}
.btn-primary:active{transform:scale(.97);opacity:.85}
.btn-primary.on{display:block}
.btn-reset{
  padding:13px 18px;border:1px solid var(--border-2);border-radius:var(--r);
  background:transparent;color:var(--text-3);font-size:14px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-reset:active{background:var(--card)}

/* ===== FAB ===== */
.fab{
  position:fixed;bottom:76px;right:14px;z-index:55;
  width:48px;height:48px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;box-shadow:var(--shadow);
  background:var(--primary);color:#fff;
  transition:transform .15s;
}
.fab:active{transform:scale(.88)}

/* ===== Overlay / Panel ===== */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.55);
  display:none;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
.panel{
  width:100%;max-width:500px;
  background:var(--surface);border-radius:20px 20px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  animation:slideUp .28s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-bar{width:36px;height:4px;border-radius:2px;background:var(--text-4);margin:10px auto 0}
.panel-hd{
  padding:14px 18px 10px;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:space-between;
}
.panel-close{background:none;border:none;color:var(--text-3);font-size:22px;cursor:pointer;padding:2px 6px}
.panel-bd{padding:6px 16px 24px;overflow-y:auto;flex:1}

/* ===== Sheet (Answer Card) ===== */
.sheet-legend{display:flex;gap:14px;padding:0 18px 10px;font-size:12px;color:var(--text-3)}
.sheet-legend span{display:flex;align-items:center;gap:4px}
.leg-dot{width:10px;height:10px;border-radius:50%}
.leg-gray{background:#374151}.leg-green{background:var(--success)}.leg-red{background:var(--danger)}
.sheet-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:8px;
  max-height:60dvh;overflow-y:auto;padding:4px 0;
}
.sheet-dot{
  aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .12s;
}
.sheet-dot:active{transform:scale(.85)}
.sd-pending{background:var(--card);color:var(--text-4);border:1.5px solid var(--border-2)}
.sd-ok{background:var(--success-bg);color:var(--success);border:1.5px solid rgba(34,197,94,.3)}
.sd-err{background:var(--danger-bg);color:var(--danger);border:1.5px solid rgba(239,68,68,.3)}
.sd-here{box-shadow:0 0 0 2.5px var(--primary-light)}

/* ===== Result ===== */
.res-card{background:var(--surface);border-radius:20px;padding:32px 24px;width:100%;max-width:340px;text-align:center}
.res-ring{width:120px;height:120px;margin:0 auto 18px;position:relative}
.res-ring svg{transform:rotate(-90deg)}
.res-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.res-ring .bg{stroke:var(--border-2)}
.res-ring .fg{stroke:var(--primary);transition:stroke-dashoffset 1s ease}
.res-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700}
.res-stats{display:flex;justify-content:center;gap:24px;margin:14px 0 22px}
.res-stats div{text-align:center}
.res-stats .n{font-size:22px;font-weight:700}
.res-stats .l{font-size:12px;color:var(--text-3);margin-top:2px}
.btn-res{
  width:100%;padding:14px;background:var(--primary);color:#fff;
  border:none;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer;
}
.btn-res:active{transform:scale(.97)}

/* ===== Toast ===== */
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;
  background:var(--card);color:var(--text);padding:10px 20px;border-radius:var(--r);
  font-size:14px;box-shadow:var(--shadow);opacity:0;
  transition:opacity .25s;pointer-events:none;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- Loading -->
<div id="scrLoad" class="screen active"><div class="spinner"></div><div style="color:var(--text-3);font-size:14px">正在加载题库...</div></div>
<!-- Error -->
<div id="scrErr" class="screen"><div class="error-box" id="errMsg"></div></div>

<!-- Quiz -->
<div id="scrQuiz" class="screen" style="justify-content:flex-start">
  <div class="hdr">
    <div class="mode-bar" id="modeBar"><span>📖 错题练习模式</span><button onclick="exitWrong()">退出</button></div>
    <div class="hdr-row">
      <div class="hdr-left">
        <span class="type-tag" id="tagType">单选题</span>
        <span class="stat stat-ok" id="sOk">✓ 0</span>
        <span class="stat stat-err" id="sErr">✗ 0</span>
      </div>
      <div class="hdr-right">
        <span class="qnum" id="qNum">1/600</span>
      </div>
    </div>
    <div class="progress"><div class="progress-inner" id="pBar" style="width:0%"></div></div>
  </div>
  <div class="main">
    <div class="stem" id="stemBox"></div>
    <div id="optsBox"></div>
    <!-- 本地解析面板：答错时即时展开 -->
    <div class="analysis-panel" id="analysisPanel" hidden>
      <div class="analysis-header">📖 题目解析</div>
      <div class="analysis-content" id="analysisContent"></div>
    </div>
  </div>
  <div class="btm">
    <button class="btn-reset" onclick="confirmReset()">重置</button>
    <button class="btn-primary" id="btnNext" onclick="nextQuestion()">下一题</button>
  </div>
  <button class="fab" onclick="openSheet()" title="答题卡">📊</button>
</div>

<!-- Answer Sheet Overlay -->
<div class="overlay" id="ovSheet" onclick="closeOut(event,'ovSheet')">
  <div class="panel">
    <div class="panel-bar"></div>
    <div class="panel-hd"><span>📊 答题卡</span><button class="panel-close" onclick="closeSheet()">✕</button></div>
    <div class="sheet-legend">
      <span><span class="leg-dot leg-gray"></span>未做</span>
      <span><span class="leg-dot leg-green"></span>正确</span>
      <span><span class="leg-dot leg-red"></span>错误</span>
      <span style="margin-left:auto;font-size:11px" id="sheetSummary"></span>
    </div>
    <div class="panel-bd"><div class="sheet-grid" id="sheetGrid"></div></div>
  </div>
</div>

<!-- Result -->
<div id="scrRes" class="screen">
  <div class="res-card">
    <div class="res-ring">
      <svg viewBox="0 0 120 120" width="120" height="120">
        <circle class="bg" cx="60" cy="60" r="52"/>
        <circle class="fg" id="resRing" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
      </svg>
      <div class="res-pct" id="resPct">0%</div>
    </div>
    <div style="font-size:18px;font-weight:600;margin-bottom:4px">答题结束</div>
    <div class="res-stats">
      <div><div class="n" id="resAll" style="color:var(--primary)">0</div><div class="l">总题数</div></div>
      <div><div class="n" id="resOk" style="color:var(--success)">0</div><div class="l">正确</div></div>
      <div><div class="n" id="resErr" style="color:var(--danger)">0</div><div class="l">错误</div></div>
    </div>
    <button class="btn-res" onclick="restart()">重新开始</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ========================================
   STORAGE KEYS
   ======================================== */
const SK = {
  state: 'aq_state',       // { [qid]: 'correct'|'wrong' }
  idx:   'aq_idx',         // last viewed index
  order: 'aq_order',       // question order array
  wb:    'aq_wrongbook'    // wrong book
};

/* ========================================
   STORAGE HELPERS
   ======================================== */
function lsGet(k,d){try{const v=localStorage.getItem(SK[k]);return v?JSON.parse(v):d}catch{return d}}
function lsSet(k,v){try{localStorage.setItem(SK[k],JSON.stringify(v))}catch{}}

function getState(){return lsGet('state',{})}
function setState(s){lsSet('state',s)}
function setQState(qid,status){const s=getState();s[qid]=status;setState(s)}
function getWB(){return lsGet('wb',[])}
function setWB(w){lsSet('wb',w)}
function getOrder(){return lsGet('order',null)}
function setOrder(o){lsSet('order',o)}
function getLastIdx(){return lsGet('idx',0)}
function setLastIdx(i){lsSet('idx',i)}

/* ========================================
   GLOBALS
   ======================================== */
let allQ = [];
let Q = [];
let qi = 0;
let answered = false;
let wrongMode = false;
let autoTimer = null;

/* ========================================
   INIT
   ======================================== */
async function init(){
  try{
    const r = await fetch('questions.json');
    if(!r.ok) throw new Error('HTTP '+r.status);
    allQ = await r.json();
    if(!allQ.length) throw new Error('题库为空');
    resumeOrStart();
  }catch(e){
    el('errMsg').textContent='加载题库失败: '+e.message+'\n请确认 questions.json 在同目录。';
    go('scrErr');
  }
}

function resumeOrStart(){
  wrongMode = false;
  el('modeBar').classList.remove('on');

  const savedOrder = getOrder();
  const savedIdx   = getLastIdx();

  if(savedOrder && savedOrder.length === allQ.length){
    const map = {};
    allQ.forEach(q => map[q.question_id] = q);
    Q = savedOrder.map(id => map[id]).filter(Boolean);
    qi = Math.min(savedIdx, Q.length - 1);
  }else{
    Q = shuffle([...allQ]);
    qi = 0;
  }

  go('scrQuiz');
  render();
}

/* ========================================
   RENDER QUESTION
   ======================================== */
function render(){
  answered = false;
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }

  const q = Q[qi];
  if(!q) return;

  // 重置面板
  el('analysisPanel').hidden = true;
  el('analysisContent').innerHTML = '';
  el('btnNext').classList.remove('on');
  el('btnNext').textContent = qi >= Q.length - 1 ? '查看结果' : '下一题';

  // Header
  el('tagType').textContent = q.type==='single' ? '单选题' : '判断题';
  el('qNum').textContent    = (qi+1) + '/' + Q.length;
  el('stemBox').textContent = q.stem;

  // 选项
  const box = el('optsBox');
  box.innerHTML = '';
  let opts = q.type==='single' ? parseOpts(q.options) : [{l:'A',t:'正确'},{l:'B',t:'错误'}];
  const correct = normAns(q);

  opts.forEach(o=>{
    const d = document.createElement('div');
    d.className = 'opt';
    d.dataset.l = o.l;
    d.innerHTML = `<span class="opt-letter">${o.l}</span><span class="opt-body">${o.t}</span>`;
    d.onclick = ()=> pick(d, o.l, correct, q);
    box.appendChild(d);
  });

  refreshHeader();
  setLastIdx(qi);
  setOrder(Q.map(q=>q.question_id));
  window.scrollTo({top:0,behavior:'smooth'});
}

function refreshHeader(){
  const st = getState();
  let ok=0,err=0;
  for(const k in st){if(st[k]==='correct')ok++;else if(st[k]==='wrong')err++}
  el('sOk').textContent  = '✓ '+ok;
  el('sErr').textContent = '✗ '+err;
  el('pBar').style.width = ((qi/Q.length)*100)+'%';
}

/* ========================================
   PARSE
   ======================================== */
function parseOpts(raw){
  const res=[], L=['A','B','C','D'];
  for(let i=0;i<L.length;i++){
    const t=L[i]+'.', s=raw.indexOf(t);
    if(s===-1) continue;
    const e=i<L.length-1 ? (raw.indexOf(L[i+1]+'.',s+2)===-1?raw.length:raw.indexOf(L[i+1]+'.',s+2)) : raw.length;
    res.push({l:L[i],t:raw.slice(s+2,e).trim()});
  }
  return res;
}
function normAns(q){
  let a = q.answer.trim();
  if(q.type==='judge'){
    a = (a==='正确'||a==='A') ? 'A' : 'B';
  }else{
    a = a.toUpperCase();
  }
  return a;
}

/* ========================================
   PICK ANSWER
   ======================================== */
function pick(cell, picked, correct, q){
  if(answered) return;
  answered = true;

  const allOpts = document.getElementById('optsBox').querySelectorAll('.opt');
  allOpts.forEach(o=>o.classList.add('locked'));

  if(picked===correct){
    // 答对：绿色 + 600ms 自动跳转
    cell.classList.add('hit-ok');
    if(!wrongMode) setQState(q.question_id,'correct');
    refreshHeader();
    autoTimer = setTimeout(()=> nextQuestion(), 600);
  }else{
    // 答错：红色 + 正确标绿 + 即时展开本地解析
    cell.classList.add('hit-err');
    allOpts.forEach(o=>{if(o.dataset.l===correct) o.classList.add('show-ok')});
    if(!wrongMode){
      setQState(q.question_id,'wrong');
      addWB(q);
    }
    refreshHeader();
    showAnalysis(q);
    document.getElementById('btnNext').classList.add('on');
  }
}

/* ========================================
   LOCAL ANALYSIS — marked.parse(q.analysis)
   ======================================== */
function showAnalysis(q){
  const panel = el('analysisPanel');
  const content = el('analysisContent');
  const raw = q.analysis || '（暂无解析）';

  if(typeof marked !== 'undefined' && marked.parse){
    content.innerHTML = marked.parse(raw);
  }else{
    content.textContent = raw;
  }
  panel.hidden = false;
}

/* ========================================
   WRONG BOOK
   ======================================== */
function addWB(q){
  const w=getWB();
  if(w.some(x=>x.question_id===q.question_id)) return;
  w.push({question_id:q.question_id,type:q.type,stem:q.stem,options:q.options||'',answer:q.answer});
  setWB(w);
}
function rmWB(qid){setWB(getWB().filter(w=>w.question_id!==qid))}

/* ========================================
   NAVIGATION
   ======================================== */
function nextQuestion(){
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  el('analysisPanel').hidden = true;
  el('btnNext').classList.remove('on');
  answered = false;

  qi++;
  if(qi>=Q.length) showResult();
  else render();
}

function showResult(){
  go('scrRes');
  const total=Q.length, st=getState();
  let ok=0;Q.forEach(q=>{if(st[q.question_id]==='correct')ok++});
  const err=total-ok, pct=total?Math.round(ok/total*100):0;
  el('resPct').textContent=pct+'%';
  el('resAll').textContent=total;
  el('resOk').textContent=ok;
  el('resErr').textContent=err;
  const c=2*Math.PI*52;
  el('resRing').style.strokeDashoffset=c*(1-pct/100);
  el('resRing').style.stroke=pct>=80?'var(--success)':pct>=60?'var(--primary)':'var(--danger)';
}

function restart(){
  if(wrongMode){startWrong();return}
  setState({});setOrder(null);setLastIdx(0);
  Q=shuffle([...allQ]);qi=0;
  el('btnNext').textContent='下一题';
  go('scrQuiz');render();
}

function confirmReset(){
  if(!confirm('确定要清空所有答题记录并从头开始吗？')) return;
  setState({});setOrder(null);setLastIdx(0);setWB([]);
  Q=shuffle([...allQ]);qi=0;wrongMode=false;
  el('modeBar').classList.remove('on');
  el('btnNext').textContent='下一题';
  go('scrQuiz');render();
  toast('已重置全部进度');
}

/* ========================================
   WRONG MODE
   ======================================== */
function startWrong(){
  const wb=getWB();
  if(!wb.length){toast('暂无错题');return}
  wrongMode=true;
  Q=wb.map(w=>allQ.find(q=>q.question_id===w.question_id)||w).filter(Boolean);
  shuffle(Q);
  qi=0;
  el('modeBar').classList.add('on');
  el('btnNext').textContent='下一题';
  go('scrQuiz');render();
}
function exitWrong(){
  wrongMode=false;
  resumeOrStart();
}

/* ========================================
   ANSWER SHEET
   ======================================== */
function openSheet(){
  const grid=el('sheetGrid');
  grid.innerHTML='';
  const st=getState();

  let okC=0,errC=0;
  Q.forEach((q,i)=>{
    const d=document.createElement('div');
    let cls='sheet-dot ';
    const s=st[q.question_id];
    if(s==='correct'){cls+='sd-ok';okC++}
    else if(s==='wrong'){cls+='sd-err';errC++}
    else cls+='sd-pending';
    if(i===qi) cls+=' sd-here';
    d.className=cls;
    d.textContent=q.question_id;
    d.onclick=()=>{qi=i;render();closeSheet()};
    grid.appendChild(d);
  });
  el('sheetSummary').textContent=`共${Q.length}题 · 正确${okC} · 错误${errC}`;
  el('ovSheet').classList.add('open');
}
function closeSheet(){el('ovSheet').classList.remove('open')}

/* ========================================
   UTILS
   ======================================== */
function el(id){return document.getElementById(id)}
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));el(id).classList.add('active')}
function closeOut(e,id){if(e.target===e.currentTarget) el(id).classList.remove('open')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function toast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

/* ========================================
   GO
   ======================================== */
init();
</script>
</body>
</html>
