<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI训练师4级刷题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--card:#1e293b;--card-hover:#253349;
  --primary:#6366f1;--primary-glow:rgba(99,102,241,.25);
  --success:#22c55e;--success-bg:rgba(34,197,94,.12);
  --error:#ef4444;--error-bg:rgba(239,68,68,.12);
  --correct-highlight:#16a34a;
  --text:#f1f5f9;--text-dim:#94a3b8;--text-muted:#64748b;
  --border:#334155;--radius:14px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;padding:0;
  -webkit-tap-highlight-color:transparent;
}
/* ===== Loading / Error ===== */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center}
.screen.active{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{color:var(--error);font-size:15px;line-height:1.6}

/* ===== Header ===== */
.header{
  position:sticky;top:0;z-index:10;
  background:rgba(15,23,42,.85);backdrop-filter:blur(12px);
  padding:12px 16px 10px;border-bottom:1px solid var(--border);
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.badge{
  font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:var(--primary);color:#fff;letter-spacing:.5px;
}
.stats-row{display:flex;gap:8px;align-items:center}
.stat-badge{
  font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;
  display:inline-flex;align-items:center;gap:4px;
}
.stat-correct{background:var(--success-bg);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.stat-wrong{background:var(--error-bg);color:var(--error);border:1px solid rgba(239,68,68,.3)}
.score-pill{
  font-size:13px;color:var(--text-dim);
  background:var(--card);padding:4px 12px;border-radius:20px;
}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#a78bfa);border-radius:3px;transition:width .4s ease}

/* ===== Main ===== */
.main{padding:16px;padding-bottom:120px}
.stem{
  font-size:17px;line-height:1.7;font-weight:500;
  margin-bottom:20px;padding:0 2px;
}
/* ===== Options ===== */
.option{
  display:block;width:100%;
  padding:14px 16px;margin-bottom:10px;
  background:var(--card);border:2px solid transparent;
  border-radius:var(--radius);color:var(--text);
  font-size:15px;line-height:1.5;text-align:left;
  cursor:pointer;transition:all .2s;position:relative;
  -webkit-user-select:none;user-select:none;
}
.option:active{transform:scale(.98)}
.option .letter{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:8px;
  background:var(--border);font-weight:700;font-size:13px;
  margin-right:10px;flex-shrink:0;transition:all .2s;
}
.option.selected-correct{background:var(--success-bg);border-color:var(--success)}
.option.selected-correct .letter{background:var(--success);color:#fff}
.option.selected-wrong{background:var(--error-bg);border-color:var(--error)}
.option.selected-wrong .letter{background:var(--error);color:#fff}
.option.show-correct{background:var(--success-bg);border-color:var(--correct-highlight)}
.option.show-correct .letter{background:var(--correct-highlight);color:#fff}
.option.disabled{pointer-events:none;opacity:.7}
.option.disabled.show-correct{opacity:1}

/* ===== Collect Button ===== */
.collect-row{margin-top:12px;text-align:center}
.btn-collect{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;border-radius:var(--radius);
  border:1px dashed var(--border);background:transparent;
  color:var(--text-dim);font-size:14px;cursor:pointer;
  transition:all .2s;
}
.btn-collect:active{transform:scale(.97)}
.btn-collect.collected{
  border-color:var(--primary);color:var(--primary);
  background:rgba(99,102,241,.08);
}

/* ===== AI Panel ===== */
.ai-panel{
  margin-top:16px;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(168,85,247,.08));
  border:1px solid rgba(99,102,241,.25);
  overflow:hidden;
  animation:slideDown .35s ease;
}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}
.ai-header{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;font-size:14px;font-weight:600;
  color:#a78bfa;border-bottom:1px solid rgba(99,102,241,.15);
}
.ai-header .dot{width:8px;height:8px;border-radius:50%;background:#a78bfa;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ai-body{padding:16px;font-size:14px;line-height:1.8;color:var(--text)}
.ai-body h3{font-size:15px;margin:12px 0 6px;color:#c4b5fd}
.ai-body h3:first-child{margin-top:0}
.ai-body p{margin-bottom:8px}
.ai-body ul{padding-left:18px;margin-bottom:8px}
.ai-body strong{color:#e2e8f0}
.ai-body code{background:rgba(99,102,241,.15);padding:1px 5px;border-radius:4px;font-size:13px}
.ai-loading{padding:24px 16px;text-align:center;color:var(--text-dim);font-size:14px}
.ai-loading .dots::after{content:'';animation:dots 1.5s steps(4) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ===== Bottom Bar ===== */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));
  background:rgba(15,23,42,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);z-index:10;
}
.btn-next{
  display:none;width:100%;padding:14px;
  background:var(--primary);color:#fff;border:none;
  border-radius:var(--radius);font-size:16px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.btn-next:active{transform:scale(.97);opacity:.85}
.btn-next.show{display:block}

/* ===== Floating Buttons ===== */
.fab-group{
  position:fixed;bottom:70px;right:16px;z-index:15;
  display:flex;flex-direction:column;gap:10px;
}
.fab{
  width:50px;height:50px;border-radius:50%;
  border:none;display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:all .2s;
}
.fab:active{transform:scale(.9)}
.fab-card{background:var(--primary);color:#fff}
.fab-wrong{background:#f59e0b;color:#fff}
.fab .badge-dot{
  position:absolute;top:-2px;right:-2px;
  min-width:18px;height:18px;border-radius:9px;
  background:var(--error);color:#fff;font-size:10px;
  font-weight:700;display:flex;align-items:center;justify-content:center;
  padding:0 4px;
}

/* ===== Answer Sheet Overlay ===== */
.sheet-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.6);
  display:none;align-items:flex-end;justify-content:center;
}
.sheet-overlay.open{display:flex}
.sheet-panel{
  width:100%;max-width:500px;max-height:75dvh;
  background:var(--card);border-radius:20px 20px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--text-muted);margin:10px auto 0;
}
.sheet-title{
  padding:14px 20px 10px;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:space-between;
}
.sheet-title .close-btn{
  background:none;border:none;color:var(--text-dim);
  font-size:22px;cursor:pointer;padding:4px 8px;
}
.sheet-legend{
  display:flex;gap:16px;padding:0 20px 10px;font-size:12px;color:var(--text-dim);
}
.sheet-legend span{display:flex;align-items:center;gap:4px}
.sheet-legend .dot{width:10px;height:10px;border-radius:3px}
.dot-gray{background:#475569}.dot-green{background:var(--success)}.dot-red{background:var(--error)}
.sheet-body{
  padding:10px 16px 20px;overflow-y:auto;flex:1;
}
.sheet-grid{
  display:grid;grid-template-columns:repeat(8,1fr);gap:6px;
}
.sheet-cell{
  aspect-ratio:1;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;
}
.sheet-cell:active{transform:scale(.9)}
.cell-pending{background:#1e293b;color:var(--text-muted);border:1px solid var(--border)}
.cell-correct{background:var(--success-bg);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.cell-wrong{background:var(--error-bg);color:var(--error);border:1px solid rgba(239,68,68,.3)}
.cell-current{outline:2px solid var(--primary);outline-offset:-2px}

/* ===== Wrong Book Overlay ===== */
.wrong-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.6);
  display:none;align-items:flex-end;justify-content:center;
}
.wrong-overlay.open{display:flex}
.wrong-panel{
  width:100%;max-width:500px;max-height:80dvh;
  background:var(--card);border-radius:20px 20px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  animation:slideUp .3s ease;
}
.wrong-body{padding:10px 16px 20px;overflow-y:auto;flex:1}
.wrong-item{
  background:var(--bg);border-radius:12px;padding:14px;margin-bottom:10px;
  border:1px solid var(--border);
}
.wrong-item-stem{font-size:14px;line-height:1.6;margin-bottom:8px;font-weight:500}
.wrong-item-meta{font-size:12px;color:var(--text-dim);display:flex;gap:12px;flex-wrap:wrap}
.wrong-item-meta .tag{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.tag-my{background:var(--error-bg);color:var(--error)}
.tag-right{background:var(--success-bg);color:var(--success)}
.wrong-empty{
  text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px;
}
.wrong-actions{display:flex;gap:8px;margin-top:8px}
.wrong-actions button{
  flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;
}
.wrong-actions button:active{opacity:.7}
.btn-practice{border-color:var(--primary)!important;color:var(--primary)!important}

/* ===== Result Screen ===== */
.result-card{
  background:var(--card);border-radius:20px;
  padding:32px 24px;width:100%;max-width:340px;
  text-align:center;
}
.result-ring{
  width:120px;height:120px;margin:0 auto 20px;position:relative;
}
.result-ring svg{transform:rotate(-90deg)}
.result-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.result-ring .bg{stroke:var(--border)}
.result-ring .fg{stroke:var(--primary);transition:stroke-dashoffset 1s ease}
.result-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;
}
.result-stats{display:flex;justify-content:center;gap:24px;margin:16px 0 24px}
.result-stats div{text-align:center}
.result-stats .num{font-size:22px;font-weight:700}
.result-stats .label{font-size:12px;color:var(--text-dim);margin-top:2px}
.btn-restart{
  width:100%;padding:14px;background:var(--primary);color:#fff;
  border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;
}

/* ===== Mode Banner ===== */
.mode-banner{
  padding:8px 16px;background:rgba(245,158,11,.1);
  border-bottom:1px solid rgba(245,158,11,.2);
  display:none;align-items:center;justify-content:space-between;
  font-size:13px;color:#f59e0b;
}
.mode-banner.show{display:flex}
.mode-banner button{
  background:none;border:1px solid #f59e0b;color:#f59e0b;
  padding:4px 12px;border-radius:8px;font-size:12px;cursor:pointer;
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading" class="screen active">
  <div class="spinner"></div>
  <div style="color:var(--text-dim);font-size:14px">正在加载题库...</div>
</div>

<!-- Error Screen -->
<div id="errorScreen" class="screen">
  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- Quiz Screen -->
<div id="quizScreen" class="screen" style="justify-content:flex-start">
  <div class="header">
    <div class="mode-banner" id="modeBanner">
      <span>📖 错题练习模式</span>
      <button onclick="exitWrongMode()">退出</button>
    </div>
    <div class="header-top">
      <span class="badge" id="typeBadge">单选题</span>
      <div class="stats-row">
        <span class="stat-badge stat-correct" id="statCorrect">✓ 正确：0</span>
        <span class="stat-badge stat-wrong" id="statWrong">✗ 错误：0</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="main">
    <div class="stem" id="stemText"></div>
    <div id="optionsContainer"></div>
    <div id="collectContainer"></div>
    <div id="aiContainer"></div>
  </div>
  <div class="bottom-bar">
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题</button>
  </div>
  <div class="fab-group">
    <button class="fab fab-card" onclick="openSheet()" title="答题卡">📊</button>
    <button class="fab fab-wrong" onclick="openWrongBook()" title="错题本" style="position:relative">
      📥<span class="badge-dot" id="wrongCount" style="display:none">0</span>
    </button>
  </div>
</div>

<!-- Answer Sheet Overlay -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheetOutside(event)">
  <div class="sheet-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span>📊 答题卡</span>
      <button class="close-btn" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-legend">
      <span><span class="dot dot-gray"></span>未做</span>
      <span><span class="dot dot-green"></span>正确</span>
      <span><span class="dot dot-red"></span>错误</span>
    </div>
    <div class="sheet-body">
      <div class="sheet-grid" id="sheetGrid"></div>
    </div>
  </div>
</div>

<!-- Wrong Book Overlay -->
<div class="wrong-overlay" id="wrongOverlay" onclick="closeWrongOutside(event)">
  <div class="wrong-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span>📥 我的错题本</span>
      <button class="close-btn" onclick="closeWrongBook()">✕</button>
    </div>
    <div class="wrong-body" id="wrongBody"></div>
  </div>
</div>

<!-- Result Screen -->
<div id="resultScreen" class="screen">
  <div class="result-card">
    <div class="result-ring">
      <svg viewBox="0 0 120 120" width="120" height="120">
        <circle class="bg" cx="60" cy="60" r="52"/>
        <circle class="fg" id="resultRing" cx="60" cy="60" r="52"
          stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
      </svg>
      <div class="result-pct" id="resultPct">0%</div>
    </div>
    <div style="font-size:18px;font-weight:600;margin-bottom:4px">答题结束</div>
    <div class="result-stats">
      <div><div class="num" id="resultTotal" style="color:var(--primary)">0</div><div class="label">总题数</div></div>
      <div><div class="num" id="resultCorrect" style="color:var(--success)">0</div><div class="label">正确</div></div>
      <div><div class="num" id="resultWrong" style="color:var(--error)">0</div><div class="label">错误</div></div>
    </div>
    <button class="btn-restart" onclick="restart()">重新开始</button>
  </div>
</div>

<script>
// ==================== 配置区 ====================
const API_KEY    = "tp-conw275x6s5sk1v7wa80nl0nb86qhmjeid436w19h33p5rnz";
const BASE_URL   = "https://token-plan-cn.xiaomimimo.com/v1/chat/completions";
const MODEL_NAME = "MiMo-V2-Flash";
// ================================================

let allQuestions = [];       // 全量题库
let questions   = [];        // 当前模式下的题库（全部 or 错题）
let idx = 0, total = 0;
let correctCount = 0;
let answered = false;
let wrongMode = false;       // 是否在错题练习模式

// ——— 错题本（localStorage 持久化） ———
const WB_KEY = 'wrongBook';
function loadWB(){ try{return JSON.parse(localStorage.getItem(WB_KEY))||[]}catch{return[]} }
function saveWB(list){ localStorage.setItem(WB_KEY, JSON.stringify(list)) }
function isInWB(qid){ return loadWB().some(w=>w.question_id===qid) }
function addToWB(q){
  const wb = loadWB();
  if(wb.some(w=>w.question_id===q.question_id)) return;
  wb.push({
    question_id: q.question_id, type: q.type,
    stem: q.stem, options: q.options||'',
    answer: q.answer
  });
  saveWB(wb);
  updateWBCount();
}
function removeFromWB(qid){
  saveWB(loadWB().filter(w=>w.question_id!==qid));
  updateWBCount();
}
function updateWBCount(){
  const n = loadWB().length;
  const el = document.getElementById('wrongCount');
  if(n>0){ el.style.display='flex'; el.textContent=n; }
  else{ el.style.display='none'; }
}

// ——— 答题状态（localStorage，按题库来源区分） ———
const STATE_KEY = 'quizState';
function loadState(){ try{return JSON.parse(localStorage.getItem(STATE_KEY))||{}}catch{return{}} }
function saveState(s){ localStorage.setItem(STATE_KEY, JSON.stringify(s)) }
function getState(qid){
  const s = loadState();
  return s[qid]; // undefined | 'correct' | 'wrong'
}
function setState(qid, status){
  const s = loadState();
  s[qid] = status;
  saveState(s);
}
function clearState(){ localStorage.removeItem(STATE_KEY) }

// ——— Shuffle ———
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]]}return a}

// ——— Init ———
async function init(){
  try{
    const res = await fetch('questions.json');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    allQuestions = await res.json();
    if(!allQuestions.length) throw new Error('题库为空');
    startNormal();
  }catch(e){
    document.getElementById('errorMsg').textContent =
      `加载题库失败: ${e.message}\n请确认 questions.json 存在于同级目录。`;
    show('errorScreen');
  }
}

function startNormal(){
  wrongMode = false;
  questions = shuffle([...allQuestions]);
  total = questions.length;
  idx = 0;
  // 统计已有答题记录
  recalcCounters();
  document.getElementById('modeBanner').classList.remove('show');
  show('quizScreen');
  render();
  updateWBCount();
}

function startWrongPractice(){
  const wb = loadWB();
  if(!wb.length) return;
  wrongMode = true;
  // 用错题本中的题还原完整对象
  questions = wb.map(w=>{
    return allQuestions.find(q=>q.question_id===w.question_id) || w;
  }).filter(Boolean);
  if(!questions.length) return;
  shuffle(questions);
  total = questions.length;
  idx = 0;
  correctCount = 0;
  document.getElementById('modeBanner').classList.add('show');
  show('quizScreen');
  render();
}

function exitWrongMode(){ startNormal() }

function recalcCounters(){
  const s = loadState();
  correctCount = 0;
  let wrongN = 0;
  for(const k in s){
    if(s[k]==='correct') correctCount++;
    else if(s[k]==='wrong') wrongN++;
  }
}

// ——— Screen switching ———
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ——— Render question ———
function render(){
  answered = false;
  const q = questions[idx];
  document.getElementById('typeBadge').textContent = q.type==='single'?'单选题':'判断题';
  document.getElementById('stemText').textContent = q.stem;
  document.getElementById('aiContainer').innerHTML = '';
  document.getElementById('btnNext').classList.remove('show');

  // 收藏按钮
  const colDiv = document.getElementById('collectContainer');
  const inWB = isInWB(q.question_id);
  colDiv.innerHTML = `
    <div class="collect-row">
      <button class="btn-collect ${inWB?'collected':''}" id="btnCollect" onclick="toggleCollect(${q.question_id})">
        ${inWB ? '✅ 已收藏' : '📥 收藏到错题本'}
      </button>
    </div>`;

  // 选项
  const box = document.getElementById('optionsContainer');
  box.innerHTML = '';
  let opts;
  if(q.type==='single'){
    opts = parseOptions(q.options);
  }else{
    opts = [{letter:'A',text:'正确'},{letter:'B',text:'错误'}];
  }
  const correctLetter = normalizeAnswer(q);
  opts.forEach(o=>{
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = o.letter;
    div.innerHTML = `<span class="letter">${o.letter}</span>${o.text}`;
    div.onclick = ()=> handlePick(div, o.letter, correctLetter, q);
    box.appendChild(div);
  });

  updateHeader();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateHeader(){
  document.getElementById('statCorrect').textContent = `✓ 正确：${correctCount}`;
  document.getElementById('statWrong').textContent = `✗ 错误：${getWrongCount()}`;
  document.getElementById('progressFill').style.width = `${(idx/total)*100}%`;
}

function getWrongCount(){
  if(wrongMode) return total - correctCount; // 练习模式直接算
  const s = loadState();
  let n=0; for(const k in s) if(s[k]==='wrong') n++;
  return n;
}

// ——— Parse options ———
function parseOptions(raw){
  const result = [];
  const letters = ['A','B','C','D'];
  for(let i=0;i<letters.length;i++){
    const tag = letters[i]+'.';
    const start = raw.indexOf(tag);
    if(start===-1) continue;
    const end = i<letters.length-1
      ? (raw.indexOf(letters[i+1]+'.', start+2) ?? raw.length)
      : raw.length;
    result.push({letter:letters[i], text: raw.slice(start+2, end===-1?raw.length:end).trim()});
  }
  return result;
}

function normalizeAnswer(q){
  if(q.type==='judge') return q.answer==='正确'?'A':'B';
  return q.answer.trim().toUpperCase();
}

// ——— Handle pick ———
function handlePick(el, picked, correctLetter, q){
  if(answered) return;
  answered = true;

  const allOpts = document.querySelectorAll('.option');
  allOpts.forEach(o=>o.classList.add('disabled'));

  if(picked === correctLetter){
    el.classList.add('selected-correct');
    correctCount++;
    if(!wrongMode) setState(q.question_id, 'correct');
  }else{
    el.classList.add('selected-wrong');
    allOpts.forEach(o=>{
      if(o.dataset.letter===correctLetter) o.classList.add('show-correct');
    });
    if(!wrongMode){
      setState(q.question_id, 'wrong');
      addToWB(q); // 答错自动收藏
      // 更新收藏按钮
      const bc = document.getElementById('btnCollect');
      if(bc){bc.classList.add('collected');bc.textContent='✅ 已收藏';}
    }
    fetchAI(q, picked, correctLetter);
  }

  updateHeader();
  document.getElementById('btnNext').classList.add('show');

  if(idx >= questions.length - 1){
    document.getElementById('btnNext').textContent = '查看结果';
  }
}

// ——— 收藏切换 ———
function toggleCollect(qid){
  const q = allQuestions.find(x=>x.question_id===qid) || questions.find(x=>x.question_id===qid);
  if(!q) return;
  const btn = document.getElementById('btnCollect');
  if(isInWB(qid)){
    removeFromWB(qid);
    btn.classList.remove('collected');
    btn.textContent = '📥 收藏到错题本';
  }else{
    addToWB(q);
    btn.classList.add('collected');
    btn.textContent = '✅ 已收藏';
  }
}

// ——— AI Analysis（修复 400） ———
async function fetchAI(q, picked, correctLetter){
  const box = document.getElementById('aiContainer');
  box.innerHTML = `
    <div class="ai-panel">
      <div class="ai-header"><span class="dot"></span>AI 导师深度解析</div>
      <div class="ai-loading">正在分析<span class="dots"></span></div>
    </div>`;

  const systemPrompt = `你是人工智能训练师（4级）考试的金牌讲师。请针对学生的错题，用简洁的中文直接回答：
1. 思维陷阱：指出学生为什么会选错。
2. 考点解析：结合考试标准讲透正确知识点。
3. 记忆口诀：一句话总结核心记忆点。
用 Markdown 格式，不要废话。`;

  const userMsg = `题目：${q.stem}\n选项：${q.options||'（判断题）'}\n学生选了：${picked}\n正确答案：${correctLetter}`;

  try{
    // 构建最简请求体，避免不支持的参数导致 400
    const body = {
      model: MODEL_NAME,
      messages: [
        {role: 'system', content: systemPrompt},
        {role: 'user', content: userMsg}
      ]
    };

    const res = await fetch(BASE_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify(body)
    });

    if(!res.ok){
      // 尝试读取错误详情
      let errDetail = '';
      try{ const errData = await res.json(); errDetail = errData.error?.message || JSON.stringify(errData); }catch{}
      throw new Error(`API ${res.status}${errDetail ? ': '+errDetail : ''}`);
    }

    const data = await res.json();
    const md = data.choices?.[0]?.message?.content;
    if(!md) throw new Error('API 返回内容为空');

    box.innerHTML = `
      <div class="ai-panel">
        <div class="ai-header"><span class="dot"></span>AI 导师深度解析</div>
        <div class="ai-body">${renderMarkdown(md)}</div>
      </div>`;
  }catch(e){
    box.innerHTML = `
      <div class="ai-panel">
        <div class="ai-header">⚠️ AI 解析失败</div>
        <div class="ai-body" style="color:var(--text-dim)">${e.message}</div>
      </div>`;
  }
}

// ——— Markdown → HTML ———
function renderMarkdown(md){
  return md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

// ——— Next / Result ———
function nextQuestion(){
  idx++;
  if(idx >= questions.length){
    showResult();
  }else{
    document.getElementById('btnNext').textContent = '下一题';
    render();
  }
}

function showResult(){
  show('resultScreen');
  const pct = total? Math.round(correctCount/total*100):0;
  document.getElementById('resultPct').textContent = pct+'%';
  document.getElementById('resultTotal').textContent = total;
  document.getElementById('resultCorrect').textContent = correctCount;
  document.getElementById('resultWrong').textContent = total-correctCount;
  const circ = 2*Math.PI*52;
  document.getElementById('resultRing').style.strokeDashoffset = circ*(1-pct/100);
  document.getElementById('resultRing').style.stroke =
    pct>=80?'var(--success)':pct>=60?'var(--primary)':'var(--error)';
}

function restart(){
  if(wrongMode){
    startWrongPractice();
  }else{
    correctCount = 0;
    clearState();
    startNormal();
  }
  document.getElementById('btnNext').textContent='下一题';
}

// ——— 答题卡 ———
function openSheet(){
  const overlay = document.getElementById('sheetOverlay');
  const grid = document.getElementById('sheetGrid');
  grid.innerHTML = '';

  const displayList = wrongMode ? questions : allQuestions;
  const state = loadState();

  displayList.forEach((q,i)=>{
    const cell = document.createElement('div');
    let cls = 'sheet-cell ';
    const s = state[q.question_id];
    if(s==='correct') cls += 'cell-correct';
    else if(s==='wrong') cls += 'cell-wrong';
    else cls += 'cell-pending';
    if(i===idx) cls += ' cell-current';
    cell.className = cls;
    cell.textContent = q.question_id;
    cell.onclick = ()=>{ jumpToQuestion(i); closeSheet(); };
    grid.appendChild(cell);
  });

  overlay.classList.add('open');
}
function closeSheet(){ document.getElementById('sheetOverlay').classList.remove('open') }
function closeSheetOutside(e){ if(e.target===e.currentTarget) closeSheet() }

function jumpToQuestion(targetIdx){
  // 如果不在当前题库列表中，需要先切换
  idx = targetIdx;
  document.getElementById('btnNext').textContent = '下一题';
  render();
}

// ——— 错题本 ———
function openWrongBook(){
  const overlay = document.getElementById('wrongOverlay');
  const body = document.getElementById('wrongBody');
  const wb = loadWB();

  if(!wb.length){
    body.innerHTML = '<div class="wrong-empty">🎉 暂无错题，继续加油！</div>';
  }else{
    body.innerHTML = wb.map(w=>{
      const opts = w.type==='judge'
        ? 'A.正确  B.错误'
        : (w.options||'');
      return `
        <div class="wrong-item">
          <div class="wrong-item-stem">${w.stem}</div>
          <div class="wrong-item-meta">
            <span class="tag tag-right">正确答案: ${w.answer}</span>
            <span>${w.type==='single'?'单选题':'判断题'}</span>
          </div>
          <div class="wrong-actions">
            <button onclick="startWrongPractice();closeWrongBook()">刷错题</button>
            <button onclick="removeFromWB(${w.question_id});openWrongBook()">移除</button>
          </div>
        </div>`;
    }).join('');
  }

  overlay.classList.add('open');
}
function closeWrongBook(){ document.getElementById('wrongOverlay').classList.remove('open') }
function closeWrongOutside(e){ if(e.target===e.currentTarget) closeWrongBook() }

// ——— Go ———
init();
</script>
